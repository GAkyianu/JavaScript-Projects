<!--index.html-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project9_Countdown_Slideshow</title>
    <link rel="stylesheet" type="text/css" href="CSS/main.css" />   
    <title
Project9_Countdown_Slideshow></title>
</head>

<body>
     
    <!--Slideshow Section-->
    <div class="slideshow-container">
        <!--ful width images with number and caption-->
    <div class="mySlides fade">
        <div class="numbertext">1 / 3</div>
        <img src="images/img_1_nature.jpg">
            style="width: 100%">
        <div class="text">Caption Text</div>
        </div>
</div>

<div class="mySlides fade">
        <div class="numbertext">2 /3</div>
        <img src="images/img_2_nature_wide.jpg">
             style="width: 100%">
            <div class="text">Caption Two</div>
        </div>
<div class="mySlides fade">
        <div class="numbertext">3 /3</div>
        <img src="images/img_3_nature_wide.jpg">
            style="width: 100%">
            <div class="text">Caption Two</div>
</div>

        <!--Next and previous buttons-->
        <a class="prev" onclick="plusSlides(-1)">❮</a>
        <a class="prev" onclick="plusSlides(1)">❯</a>

</div>
<br>
 
<div style="text-align: center">
    <span class="dot" onclick="currentSlide(1)"></span>
    <span class="dot" onclick="currentSlide(2)"></span>
    <span class="dot" onclick="currentSlide(3)"></span>
</div>

<script src="JS/main.js"></script>
    <!--Countdown Timer Section-->
    <p>How many seconds will you like to set your alarm for?</p>
    <input type="number" id="seconds" value="60" />
    <button onclick="countdown()" id="startBtn">Click</button>
    <p id="timer"></p>
    <script src="JS/main.js"></script>
</body>
</html>
